name: CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: src
  PYTHONUNBUFFERED: 1

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libgomp1

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Syntax check all .py files
        run: |
          failed=0
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path '*/__pycache__/*'); do
            python -m py_compile "$f" && echo "  OK $f" || { echo "  FAIL $f"; failed=1; }
          done
          [ "$failed" = "0" ] && echo "All syntax checks passed" || exit 1

      - name: Import check (core modules)
        run: |
          python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from providers import PROVIDER_NAMES; print(f'providers OK: {PROVIDER_NAMES}'); from comparison import COMPARISON_CACHE_VERSION; print(f'comparison OK: v{COMPARISON_CACHE_VERSION}'); from verify_demo import check_comparison; print('verify_demo OK')"

      - name: Test comparison module
        run: python .github/tests/test_comparison.py

      - name: Test state validation guard
        run: python .github/tests/test_state.py

      - name: Lint (non-blocking)
        continue-on-error: true
        run: |
          pip install ruff -q
          ruff check src/ --ignore=E402,F401,E501 --line-length=120
